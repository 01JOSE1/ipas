version: '3.8'

services:
  ipas:
    build: .
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REMEMBER_ME_KEY: ${REMEMBER_ME_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./almacenamientoPolizaPDF:/app/almacenamientoPolizaPDF
      - ./almacenamientoPolizaPDFTemporal:/app/almacenamientoPolizaPDFTemporal
      - ./logs:/app/logs
    restart: always
    depends_on:
      ipas_db:
        condition: service_healthy

  ipas_db:
    image: mysql:8.3.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ipas
    volumes:
      - ./db/ipas.sql:/docker-entrypoint-initdb.d/ipas.sql
      - ipas_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

volumes:
  ipas_data: