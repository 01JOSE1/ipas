# =====================================
# = SERVIDOR
# =====================================
server.port=8080

# Ruta base de la aplicacion ? todas las URLs empiezan con /ipas
server.servlet.context-path=/ipas

# Le dice a Spring Boot que confie en los headers del proxy Nginx (X-Forwarded-Proto, etc.)
# Sin esto Spring Boot no sabe que esta detras de HTTPS y las redirecciones fallan
server.forward-headers-strategy=NATIVE


# Para manejar la codificacion
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true



# =====================================
# = BASE DE DATOS MySQL
# =====================================
# En Docker el host es el nombre del servicio "ipas_db", no localhost
spring.datasource.url=jdbc:mysql://ipas_db:3306/ipas?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4

# Credenciales inyectadas desde el archivo .env via Docker Compose
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Driver JDBC para MySQL 8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# =====================================
# = JPA / HIBERNATE
# =====================================
# none: Hibernate no toca las tablas en produccion ? el SQL se carga manualmente
spring.jpa.hibernate.ddl-auto=none

# Desactivado en produccion: evita exponer SQL en logs y mejora el rendimiento
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Dialecto para MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Buena practica: evita mantener conexiones a la BD abiertas innecesariamente
spring.jpa.open-in-view=false



# =====================================
# = LOGGING
# =====================================
# WARN en produccion: solo registra advertencias y errores, no info ni debug
logging.level.org.springframework=WARN
logging.level.com.proyecto.ipas=WARN

# Guardar logs en archivo dentro del contenedor (mapeado como volumen en docker-compose)
logging.file.name=logs/ipas.log



# =====================================
# = SEGURIDAD
# =====================================
# Clave secreta para firmar la cookie de Remember Me ? inyectada desde .env
security.rememberme.key=${REMEMBER_ME_KEY}

# Cookies de sesion seguras para HTTPS
# secure=true: la cookie solo se envia por HTTPS, nunca por HTTP
server.servlet.session.cookie.secure=true

# http-only=true: JavaScript no puede leer la cookie (protege contra XSS)
server.servlet.session.cookie.http-only=true

# same-site=lax: protege contra ataques CSRF permitiendo navegacion normal
server.servlet.session.cookie.same-site=lax



# =====================================
# = ALMACENAMIENTO
# Rutas relativas al WORKDIR /app definido en el Dockerfile
# Docker mapea estas carpetas como volumenes en docker-compose.yml
# =====================================
app.almacenamiento.destino=almacenamientoPolizaPDF
app.almacenamiento.destino-temporal=almacenamientoPolizaPDFTemporal

# Tamano maximo de archivos permitidos en subidas
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# -1: Tomcat no limita el tamano al descartar el cuerpo de la peticion
# Evita el loop de la excepcion MaxUploadSizeExceededException
server.tomcat.max-swallow-size=-1



# =====================================
# = THYMELEAF
# =====================================
# cache=true en produccion: las plantillas se cachean para mejor rendimiento
# En desarrollo debe estar en false para ver cambios sin reiniciar
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8



# =====================================
# = API GEMINI (Google Generative AI)
# =====================================
# API Key inyectada desde .env ? nunca hardcodear en el codigo
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash