# =====================================
# = SERVIDOR
# =====================================
server.port=8080
server.servlet.context-path=/ipas

# =====================================
# = BASE DE DATOS MySQL
# =====================================
spring.datasource.url=jdbc:mysql://ipas_db:3306/ipas?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================
# = JPA / HIBERNATE
# =====================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =====================================
# = LOGGING
# =====================================
logging.level.org.springframework=WARN
logging.level.com.proyecto.ipas=WARN
logging.file.name=logs/ipas.log

# =====================================
# = SEGURIDAD
# =====================================
security.rememberme.key=${REMEMBER_ME_KEY}

# =====================================
# = ALMACENAMIENTO ? rutas relativas al WORKDIR /app del contenedor
# =====================================
app.almacenamiento.destino=almacenamientoPolizaPDF
app.almacenamiento.destino-temporal=almacenamientoPolizaPDFTemporal
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-swallow-size=-1

# =====================================
# = THYMELEAF
# =====================================
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# =====================================
# = API GEMINI
# =====================================
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
