# =====================================
# = SERVIDOR
# =====================================
#$Define el puerto en el que se ejecutará tu aplicación.
server.port=8080
#Define la ruta base de tu aplicación.
server.servlet.context-path=/ipas



# =====================================
# = BASE DE DATOS MySQL
# =====================================
#Es la URL de conexión JDBC hacia tu base de datos.
#localhost: tu máquina local.
#3306: puerto estándar de MySQL/MariaDB.
#miapp_db: nombre de tu base de datos.
#useSSL=false: desactiva SSL (útil en desarrollo).
#serverTimezone=America/Bogota: evita errores de zona horaria.
spring.datasource.url=jdbc:mysql://localhost:3306/ipas?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true

#Credenciales para conectarte a la base de datos (ARCHIVO .ENV).
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

#Le dice a Spring Boot qué driver JDBC usar (MySQL) puente de comunicación entre tu aplicación y db.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# =====================================
# = JPA / HIBERNATE: Estas propiedades controlan cómo Hibernate (el ORM de Spring Boot) maneja las tablas y las consultas SQL.
# =====================================
#none: no hace nada.
#validate: verifica si las tablas existen.
#update: crea o modifica las tablas automáticamente según tus entidades.
#create: crea las tablas al iniciar (borra las anteriores).
#create-drop: crea y borra al cerrar la app.
spring.jpa.hibernate.ddl-auto=validate

#Muestra en la consola las consultas SQL que ejecuta Hibernate.
spring.jpa.show-sql=true

#Formatea esas consultas SQL para que se vean más legibles.
spring.jpa.properties.hibernate.format_sql=true

#Define el dialecto SQL (el ?lenguaje? que entiende tu base de datos).
#Esto permite que Hibernate sepa cómo traducir las operaciones a SQL válido para MySQL.
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# =====================================
# = LOGGING: Registros y depuración
# =====================================
#Controla el nivel de detalle del log (INFO, DEBUG, WARN, ERROR) para todo lo de Spring.
logging.level.org.springframework=INFO

#Controla el nivel de log solo para tu paquete Java (tu código).
#Ejemplo: si tus clases están bajo com.miempresa.miapp, mostrará más detalles de tu app.
logging.level.com.proyecto.ipas=DEBUG

#Guarda todos los logs en un archivo dentro de la carpeta logs/ipas.log.
logging.file.name=logs/ipas.log



# Desactiva open-in-view (buena práctica)
spring.jpa.open-in-view=false