# =====================================
# = SERVIDOR
# =====================================
# Define el puerto en el que se ejecutara tu aplicacion.
server.port=8080
# Define la ruta base de tu aplicacion.
server.servlet.context-path=/ipas



# =====================================
# = BASE DE DATOS MySQL
# =====================================
# Es la URL de conexion JDBC hacia tu base de datos.
# localhost: tu maquina local.
# 3306: puerto estandar de MySQL/MariaDB.
# ipas: nombre de tu base de datos.
# useSSL=false: desactiva SSL (util en desarrollo).
# serverTimezone=America/Bogota: evita errores de zona horaria.
spring.datasource.url=jdbc:mysql://localhost:3306/ipas?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true

# Credenciales para conectarte a la base de datos (ARCHIVO .ENV).
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Le dice a Spring Boot que driver JDBC usar (MySQL) puente de comunicacion entre tu aplicacion y db.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



# =====================================
# = JPA / HIBERNATE: Estas propiedades controlan como Hibernate (el ORM de Spring Boot) maneja las tablas y las consultas SQL.
# =====================================
# none: no hace nada.
# validate: verifica si las tablas existen.
# update: crea o modifica las tablas automaticamente segun tus entidades.
# create: crea las tablas al iniciar (borra las anteriores).
# create-drop: crea y borra al cerrar la app.
spring.jpa.hibernate.ddl-auto=validate

# Muestra en la consola las consultas SQL que ejecuta Hibernate.
spring.jpa.show-sql=true

# Formatea esas consultas SQL para que se vean mas legibles.
spring.jpa.properties.hibernate.format_sql=true

# Define el dialecto SQL (el lenguaje que entiende tu base de datos).
# Esto permite que Hibernate sepa como traducir las operaciones a SQL valido para MySQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



# =====================================
# = LOGGING: Registros y depuracion
# =====================================
# Controla el nivel de detalle del log (INFO, DEBUG, WARN, ERROR) para todo lo de Spring.
logging.level.org.springframework=INFO

# Controla el nivel de log solo para tu paquete Java (tu codigo).
# Ejemplo: si tus clases estan bajo com.proyecto.ipas, mostrara mas detalles de tu app.
logging.level.com.proyecto.ipas=DEBUG

# Guarda todos los logs en un archivo dentro de la carpeta logs/ipas.log.
logging.file.name=logs/ipas.log



# Desactiva open-in-view (buena practica)
spring.jpa.open-in-view=false



# =====================================
# = SEGURIDAD
# =====================================
# Clave secreta que Spring Security usa para firmar la cookie
security.rememberme.key=${REMEMBER_ME_KEY}


# =====================================
# = ALMACENAMIENTO = Controlar el tamano de los archivos en spring boot
# =====================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# Evitar loop pra la excepcion MaxUploadSizeExceededException ya que tomcat la procesa primero
server.tomcat.max-swallow-size=-1



# =====================================
# = API MODELO DE INTELIGENCIA ARTIFICIAL = Gemini (Google Vertex AI)
# =====================================
# Si usas Gemini via API Key directa (Google AI Studio)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash