<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantillas/asesor}">

<head>
    <title>Dashboard</title>
    <th:block layout:fragment="cssVista">
        <link rel="stylesheet" th:href="@{/css/usuarios/asesor/dashboardPrincipal.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="contenidoVista">

    <!-- Bienvenida -->
    <div class="welcome-banner">
        <div class="welcome-text">
            <h1>Bienvenido, <span th:text="${#authentication.principal.nombre}">Asesor</span> 👋</h1>
            <p>Aquí tienes un resumen de tu actividad del día.</p>
        </div>
        <div class="welcome-date" id="fechaHoy"></div>
    </div>

    <!-- Tarjetas resumen -->
    <div class="cards-grid">

        <!-- Cantidad de pólizas creadas por el asesor en el último mes calendario -->
        <div class="stat-card">
            <div class="stat-icon stat-icon-blue">
                <i class="fa fa-file-medical"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Pólizas creadas este mes</span>
                <span class="stat-value" th:text="${polizasCreadasMes}">0</span>
            </div>
        </div>

        <!-- Total de gestiones (interacciones/registros) realizadas por el asesor sobre clientes y pólizas en el mes actual -->
        <div class="stat-card">
            <div class="stat-icon stat-icon-green">
                <i class="fa fa-tasks"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Gestiones este mes</span>
                <span class="stat-value" th:text="${gestionesMes}">0</span>
            </div>
        </div>

        <!-- Cantidad total (histórica) de clientes únicos gestionados por el asesor -->
        <div class="stat-card">
            <div class="stat-icon stat-icon-cyan">
                <i class="fa fa-users"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Clientes gestionados</span>
                <span class="stat-value" th:text="${clientesGestionados}">0</span>
            </div>
        </div>

        <!-- Pólizas asignadas al asesor con fecha de vencimiento en los próximos 8 días (inclusive hoy) -->
        <div class="stat-card">
            <div class="stat-icon stat-icon-orange">
                <i class="fa fa-exclamation-triangle"></i>
            </div>
            <div class="stat-info">
                <span class="stat-label">Pólizas por vencer (≤8 días)</span>
                <span class="stat-value" th:text="${polizasProximasVencer}">0</span>
            </div>
        </div>

    </div>

    <!-- Accesos rápidos -->
    <div class="quick-access-section">
        <h2 class="section-title">Accesos rápidos</h2>
        <div class="quick-grid">

            <a th:href="@{/asesor/cliente/ver-clientes}" class="quick-card">
                <div class="quick-icon"><i class="fa fa-users"></i></div>
                <span class="quick-label">Ver Clientes</span>
                <i class="fa fa-arrow-right quick-arrow"></i>
            </a>

            <a th:href="@{/asesor/poliza/ver-polizas}" class="quick-card">
                <div class="quick-icon"><i class="fa fa-file-contract"></i></div>
                <span class="quick-label">Ver Pólizas</span>
                <i class="fa fa-arrow-right quick-arrow"></i>
            </a>

            <a th:href="@{/usuarios/perfil}" class="quick-card">
                <div class="quick-icon"><i class="fa fa-user-circle"></i></div>
                <span class="quick-label">Mi Perfil</span>
                <i class="fa fa-arrow-right quick-arrow"></i>
            </a>

            <a href="#" class="quick-card">
                <div class="quick-icon"><i class="fa fa-question-circle"></i></div>
                <span class="quick-label">Ayuda</span>
                <i class="fa fa-arrow-right quick-arrow"></i>
            </a>

        </div>
    </div>

</th:block>

<th:block layout:fragment="jsVista">
    <script th:src="@{/js/usuarios/asesor/dashboardPrincipal.js}"></script>
</th:block>

</body>
</html>
