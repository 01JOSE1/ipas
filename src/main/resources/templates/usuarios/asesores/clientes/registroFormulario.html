<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantillas/asesor}">

<head>
    <title th:text="${modo == 'CREAR'} ? 'Crear Cliente' : 'Editar Cliente'">Cliente</title>
    <th:block layout:fragment="cssVista">
        <link rel="stylesheet" th:href="@{/css/usuarios/asesor/cliente/registroFormulario.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="contenidoVista">

    <!-- Encabezado -->
    <div class="page-header">
        <div class="header-icon" th:classappend="${modo == 'CREAR'} ? 'icon-green' : 'icon-blue'">
            <i class="fa" th:classappend="${modo == 'CREAR'} ? 'fa-user-plus' : 'fa-user-edit'"></i>
        </div>
        <div>
            <h1 class="page-title"
                th:text="${modo == 'CREAR'} ? 'Crear Cliente' : 'Editar Cliente'">Cliente</h1>
            <p class="page-subtitle"
               th:text="${modo == 'CREAR'} ? 'Completa los datos para registrar un nuevo cliente' : 'Modifica los datos del cliente'">
            </p>
        </div>
    </div>

    <!-- Formulario -->
    <div class="form-card">
        <form th:action="${modo == 'CREAR'}
                ? @{/asesor/cliente/registro-cliente}
                : @{/asesor/cliente/actualizacion-cliente/{idCliente}(idCliente=${gestionClienteDTO.idCliente})}"
              th:object="${gestionClienteDTO}"
              method="post">

            <!-- Sección: Datos personales -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-user"></i> Datos Personales
                </h3>
                <div class="fields-grid">

                    <div class="field-group">
                        <label>Nombre <span class="required">*</span></label>
                        <input type="text" th:field="*{nombre}" placeholder="Ej: Juan">
                        <span class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
                    </div>

                    <div class="field-group">
                        <label>Apellido <span class="required">*</span></label>
                        <input type="text" th:field="*{apellido}" placeholder="Ej: Pérez">
                        <span class="field-error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
                    </div>

                    <div class="field-group">
                        <label>Tipo de Documento <span class="required">*</span></label>
                        <select th:field="*{tipoDocumento}">
                            <option value="">Seleccione...</option>
                            <option th:each="tipo : ${T(com.proyecto.ipas.negocio.dominio.enums.TipoDocumentoCliente).values()}"
                                    th:value="${tipo}"
                                    th:text="${tipo}">
                            </option>
                        </select>
                        <span class="field-error" th:if="${#fields.hasErrors('tipoDocumento')}" th:errors="*{tipoDocumento}"></span>
                    </div>

                    <div class="field-group">
                        <label>Número de Documento <span class="required">*</span></label>
                        <input type="text" th:field="*{numeroDocumento}" placeholder="Ej: 1234567890">
                        <span class="field-error" th:if="${#fields.hasErrors('numeroDocumento')}" th:errors="*{numeroDocumento}"></span>
                    </div>

                    <div class="field-group">
                        <label>Fecha de Nacimiento </label>
                        <input type="date" th:field="*{fechaNacimiento}">
                        <span class="field-error" th:if="${#fields.hasErrors('fechaNacimiento')}" th:errors="*{fechaNacimiento}"></span>
                    </div>

                    <div class="field-group">
                        <label>Estado Civil</label>
                        <select th:field="*{estadoCivil}">
                            <option value="">Seleccione...</option>
                            <option th:each="estado : ${T(com.proyecto.ipas.negocio.dominio.enums.EstadoCivilCliente).values()}"
                                    th:value="${estado}"
                                    th:text="${estado}">
                            </option>
                        </select>
                        <span class="field-error" th:if="${#fields.hasErrors('estadoCivil')}" th:errors="*{estadoCivil}"></span>
                    </div>

                </div>
            </div>

            <!-- Sección: Contacto -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-address-book"></i> Contacto
                </h3>
                <div class="fields-grid">

                    <div class="field-group">
                        <label>Teléfono <span class="required">*</span></label>
                        <input type="text" th:field="*{telefono}" placeholder="Ej: 3001234567">
                        <span class="field-error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></span>
                    </div>

                    <div class="field-group">
                        <label>Correo Electrónico </label>
                        <input type="email" th:field="*{correo}" placeholder="Ej: cliente@correo.com">
                        <span class="field-error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></span>
                    </div>

                    <div class="field-group">
                        <label>Dirección</label>
                        <input type="text" th:field="*{direccion}" placeholder="Ej: Calle 10 #20-30">
                        <span class="field-error" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></span>
                    </div>

                    <div class="field-group">
                        <label>Ciudad</label>
                        <input type="text" th:field="*{ciudad}" placeholder="Ej: Bucaramanga">
                        <span class="field-error" th:if="${#fields.hasErrors('ciudad')}" th:errors="*{ciudad}"></span>
                    </div>

                </div>
            </div>

            <!-- Botones -->
            <div class="form-actions">
                <button type="button" class="btn-cancelar" onclick="history.back()">
                    <i class="fa fa-arrow-left"></i>
                    Cancelar
                </button>
                <button type="submit" class="btn-submit"
                        th:classappend="${modo == 'CREAR'} ? 'btn-submit-green' : 'btn-submit-blue'">
                    <i class="fa" th:classappend="${modo == 'CREAR'} ? 'fa-user-plus' : 'fa-save'"></i>
                    <span th:text="${modo == 'CREAR'} ? 'Crear Cliente' : 'Guardar Cambios'"></span>
                </button>
            </div>

        </form>
    </div>

</th:block>
</body>
</html>
