<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantillas/asesor}">

<head>
    <title>Clientes</title>
    <th:block layout:fragment="cssVista">
        <link rel="stylesheet" th:href="@{/css/usuarios/asesor/cliente/listaClientes.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="contenidoVista">

    <!-- Encabezado de página -->
    <div class="page-header">
        <div class="page-header-left">
            <h1 class="page-title">Gestión de Clientes</h1>
            <p class="page-subtitle">
                Mostrando <strong th:text="${clientes.size()}">0</strong>
                de <strong th:text="${totalRegistros}">0</strong> clientes registrados
            </p>
        </div>
        <a th:href="@{/asesor/cliente/registro-cliente}" class="btn-nuevo-cliente">
            <i class="fa fa-user-plus"></i>
            Nuevo Cliente
        </a>
    </div>

    <!-- Tabla -->
    <div class="table-card">

        <table class="clientes-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Tipo Doc.</th>
                <th>N° Documento</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>

            <!-- Sin clientes -->
            <tr th:if="${clientes.isEmpty()}" class="empty-row">
                <td colspan="7">
                    <div class="empty-state">
                        <i class="fa fa-users"></i>
                        <span>No se encontraron clientes</span>
                    </div>
                </td>
            </tr>

            <!-- Iteración -->
            <tr th:each="cliente : ${clientes}" class="cliente-row">
                <td class="td-id">
                    <span class="badge-id" th:text="${cliente.idCliente}"></span>
                </td>
                <td class="td-nombre">
                    <div class="cliente-info">
                        <div class="cliente-avatar">
                            <span th:text="${#strings.substring(cliente.nombre, 0, 1)}">A</span>
                        </div>
                        <span th:text="${cliente.nombre + ' ' + cliente.apellido}"></span>
                    </div>
                </td>
                <td>
                    <span class="badge-doc" th:text="${cliente.tipoDocumento}"></span>
                </td>
                <td th:text="${cliente.numeroDocumento}"></td>
                <td th:text="${cliente.telefono}"></td>
                <td class="td-correo" th:text="${cliente.correo}"></td>
                <td>
                    <a th:href="@{/asesor/cliente/gestion-cliente/{id}(id=${cliente.idCliente})}"
                       class="btn-gestionar">
                        <i class="fa fa-eye"></i>
                        Gestionar
                    </a>
                </td>
            </tr>

            </tbody>
        </table>
    </div>

    <!-- Paginación -->
    <nav class="pagination-wrapper" th:if="${totalPaginas > 1}">

        <a class="page-btn"
           th:classappend="${paginaActual == 0} ? ' disabled'"
           th:href="@{/asesor/cliente/ver-clientes(pagina=${paginaActual - 1}, cantidad=${catidadPagina})}">
            <i class="fa fa-chevron-left"></i>
        </a>

        <a class="page-btn page-num"
           th:each="i : ${#numbers.sequence(0, totalPaginas - 1)}"
           th:classappend="${i == paginaActual} ? ' active'"
           th:href="@{/asesor/cliente/ver-clientes(pagina=${i}, cantidad=${catidadPagina})}"
           th:text="${i + 1}">
        </a>

        <a class="page-btn"
           th:classappend="${paginaActual == totalPaginas - 1} ? ' disabled'"
           th:href="@{/asesor/cliente/ver-clientes(pagina=${paginaActual + 1}, cantidad=${catidadPagina})}">
            <i class="fa fa-chevron-right"></i>
        </a>

    </nav>

</th:block>
</body>
</html>
