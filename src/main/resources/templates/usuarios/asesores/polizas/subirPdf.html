<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantillas/asesor}">

<head>
    <title>Generar Póliza con IA</title>
    <th:block layout:fragment="cssVista">
        <link rel="stylesheet" th:href="@{/css/usuarios/asesor/poliza/subirPdf.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="contenidoVista">

    <!-- Encabezado -->
    <div class="page-header">
        <div class="header-icon icon-purple">
            <i class="fa fa-robot"></i>
        </div>
        <div>
            <h1 class="page-title">Generar Póliza con IA</h1>
            <p class="page-subtitle">Sube el PDF de la póliza y la inteligencia artificial extraerá los datos automáticamente</p>
        </div>
    </div>

    <!-- Card central -->
    <div class="upload-card">

        <form th:action="@{/asesor/poliza/generar-datos-ia}"
              method="post"
              enctype="multipart/form-data"
              id="formPdf">

            <!-- Zona de arrastre -->
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('archivo').click()">
                <div class="drop-icon">
                    <i class="fa fa-file-pdf"></i>
                </div>
                <p class="drop-title">Arrastra el PDF aquí o haz clic para seleccionar</p>
                <p class="drop-hint">Solo archivos PDF · Tamaño máximo 10 MB</p>
            </div>

            <!-- Input oculto -->
            <input type="file" id="archivo" name="archivo" accept="application/pdf">

            <!-- Info archivo seleccionado -->
            <div class="file-info" id="fileInfo">
                <div class="file-info-inner">
                    <div class="file-icon">
                        <i class="fa fa-file-pdf"></i>
                    </div>
                    <div class="file-datos">
                        <span class="file-nombre" id="fileName">archivo.pdf</span>
                        <span class="file-size" id="fileSize">—</span>
                    </div>
                    <button type="button" class="file-remove" onclick="limpiarArchivo()" title="Quitar archivo">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- Botones -->
            <div class="form-actions">
                <button type="button" class="btn-cancelar" onclick="history.back()">
                    <i class="fa fa-arrow-left"></i>
                    Cancelar
                </button>
                <button type="submit" class="btn-procesar" id="btnEnviar" disabled>
                    <i class="fa fa-robot"></i>
                    Procesar con IA
                </button>
            </div>

        </form>
    </div>

</th:block>

<th:block layout:fragment="jsVista">
    <script th:src="@{/js/usuarios/asesor/poliza/subirPdf.js}"></script>
</th:block>

</body>
</html>
