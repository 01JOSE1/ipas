<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantillas/asesor}">

<head>
    <title th:text="${modo == 'CREAR'} ? 'Registrar Póliza' : 'Editar Póliza'">Póliza</title>
    <th:block layout:fragment="cssVista">
        <link rel="stylesheet" th:href="@{/css/usuarios/asesor/poliza/registroFormulario.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="contenidoVista">

    <!-- Encabezado -->
    <div class="page-header">
        <div class="header-icon"
             th:classappend="${modo == 'CREAR'} ? 'icon-green' : 'icon-blue'">
            <i class="fa"
               th:classappend="${modo == 'CREAR'} ? 'fa-plus-circle' : 'fa-edit'"></i>
        </div>
        <div>
            <h1 class="page-title"
                th:text="${modo == 'CREAR'} ? 'Registrar Póliza' : 'Editar Póliza'">Póliza</h1>
            <p class="page-subtitle"
               th:text="${modo == 'CREAR'} ? 'Completa los datos para registrar una nueva póliza' : 'Modifica los datos de la póliza'">
            </p>
        </div>
    </div>

    <!-- Formulario -->
    <div class="form-card">
        <form th:action="${modo == 'CREAR'}
                ? @{/asesor/poliza/registro-poliza/{idCliente}(idCliente=${gestionPolizaDTO.idCliente})}
                : @{/asesor/poliza/actualizacion-poliza/{idPoliza}(idPoliza=${gestionPolizaDTO.idPoliza})}"
              th:object="${gestionPolizaDTO}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" th:field="*{idPoliza}"/>
            <input type="hidden" th:field="*{numeroPdf}"/>

            <!-- ===== SECCIÓN: Identificación ===== -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-file-contract"></i> Identificación
                </h3>
                <div class="fields-grid">

                    <div class="field-group">
                        <label>Código Póliza <span class="required">*</span></label>
                        <input type="text" th:field="*{codigoPoliza}" placeholder="Ej: POL-2024-001">
                        <span class="field-error" th:if="${#fields.hasErrors('codigoPoliza')}" th:errors="*{codigoPoliza}"></span>
                    </div>

                    <div class="field-group">
                        <label>Placa</label>
                        <input type="text" th:field="*{placa}" placeholder="Ej: ABC123"
                               style="text-transform: uppercase;">
                        <span class="field-error" th:if="${#fields.hasErrors('placa')}" th:errors="*{placa}"></span>
                    </div>

                </div>
            </div>

            <!-- ===== SECCIÓN: Cliente ===== -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-user"></i> Cliente
                </h3>
                <div class="fields-grid">

                    <div class="field-group field-group-full">
                        <label>Buscar Cliente <span class="required">*</span></label>
                        <div class="search-wrapper">
                            <i class="fa fa-search search-icon"></i>
                            <input type="text"
                                   id="busquedaCliente"
                                   th:value="*{nombreCliente}"
                                   placeholder="Buscar por nombre o número de documento..."
                                   autocomplete="off"
                                   class="search-input">
                            <div class="search-clear" id="searchClear" onclick="limpiarBusqueda()" title="Limpiar">
                                <i class="fa fa-times"></i>
                            </div>
                        </div>
                        <input type="hidden" th:field="*{idCliente}" id="idCliente"/>
                        <!-- Dropdown resultados -->
                        <div class="search-dropdown" id="resultadosCliente"></div>
                        <span class="field-hint">
                            <i class="fa fa-info-circle"></i>
                            Escribe mínimo 3 caracteres para buscar
                        </span>
                        <span class="field-error" th:if="${#fields.hasErrors('idCliente')}" th:errors="*{idCliente}"></span>
                    </div>

                </div>
            </div>

            <!-- ===== SECCIÓN: Cobertura ===== -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-shield-alt"></i> Cobertura
                </h3>
                <div class="fields-grid">

                    <div class="field-group">
                        <label>Ramo <span class="required">*</span></label>
                        <select th:field="*{idRamo}">
                            <option value="">Seleccione...</option>
                            <option th:each="ramo : ${ramos}"
                                    th:value="${ramo.idRamo}"
                                    th:text="${ramo.nombre}">
                            </option>
                        </select>
                        <span class="field-error" th:if="${#fields.hasErrors('idRamo')}" th:errors="*{idRamo}"></span>
                    </div>

                    <div class="field-group">
                        <label>Aseguradora <span class="required">*</span></label>
                        <select th:field="*{idAseguradora}">
                            <option value="">Seleccione...</option>
                            <option th:each="aseguradora : ${aseguradoras}"
                                    th:value="${aseguradora.idAseguradora}"
                                    th:text="${aseguradora.nombre}">
                            </option>
                        </select>
                        <span class="field-error" th:if="${#fields.hasErrors('idAseguradora')}" th:errors="*{idAseguradora}"></span>
                    </div>

                    <div class="field-group">
                        <label>Fecha Inicio <span class="required">*</span></label>
                        <input type="date" th:field="*{fechaInicio}">
                        <span class="field-error" th:if="${#fields.hasErrors('fechaInicio')}" th:errors="*{fechaInicio}"></span>
                    </div>

                    <div class="field-group">
                        <label>Fecha Fin <span class="required">*</span></label>
                        <input type="date" th:field="*{fechaFin}">
                        <span class="field-error" th:if="${#fields.hasErrors('fechaFin')}" th:errors="*{fechaFin}"></span>
                    </div>

                </div>
            </div>

            <!-- ===== SECCIÓN: Financiero ===== -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-dollar-sign"></i> Financiero
                </h3>
                <div class="fields-grid">

                    <div class="field-group">
                        <label>Prima Neta <span class="required">*</span></label>
                        <div class="input-prefix-wrapper">
                            <span class="input-prefix">$</span>
                            <input type="number" step="0.01" th:field="*{primaNeta}" placeholder="0.00">
                        </div>
                        <span class="field-error" th:if="${#fields.hasErrors('primaNeta')}" th:errors="*{primaNeta}"></span>
                    </div>

                    <div class="field-group">
                        <label>Prima Total <span class="required">*</span></label>
                        <div class="input-prefix-wrapper">
                            <span class="input-prefix">$</span>
                            <input type="number" step="0.01" th:field="*{primaTotal}" placeholder="0.00">
                        </div>
                        <span class="field-error" th:if="${#fields.hasErrors('primaTotal')}" th:errors="*{primaTotal}"></span>
                    </div>

                    <div class="field-group">
                        <label>Estado Pago</label>
                        <select th:field="*{estadoPago}">
                            <option value="">Seleccione...</option>
                            <option th:each="e : ${T(com.proyecto.ipas.negocio.dominio.enums.EstadoPagoPoliza).values()}"
                                    th:value="${e}" th:text="${e}">
                            </option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- ===== SECCIÓN: Descripción y Documento ===== -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-file-alt"></i> Descripción y Documento
                </h3>
                <div class="fields-grid">

                    <div class="field-group field-group-full">
                        <label>Descripción</label>
                        <textarea th:field="*{descripcion}"
                                  placeholder="Descripción de la póliza..."></textarea>
                        <span class="field-error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
                    </div>

                    <!-- PDF existente -->
                    <div class="field-group field-group-full"
                         th:if="*{numeroPdf != null and !#strings.isEmpty(numeroPdf)}">
                        <label>Documento actual</label>
                        <div class="pdf-actual">
                            <div class="pdf-info">
                                <div class="pdf-icono">
                                    <i class="fa fa-file-pdf"></i>
                                </div>
                                <div class="pdf-datos">
                                    <span class="pdf-nombre" th:text="*{numeroPdf}">archivo.pdf</span>
                                    <span class="pdf-hint">Póliza adjunta actualmente</span>
                                </div>
                            </div>
                            <a th:href="${modo == 'CREAR'}
                                    ? @{/asesor/poliza/ver-archivo-temporal/{nombre}(nombre=*{numeroPdf})}
                                    : @{/asesor/poliza/ver-archivo/{nombre}(nombre=*{numeroPdf})}"
                               target="_blank"
                               class="btn-ver-pdf">
                                <i class="fa fa-eye"></i>
                                Visualizar PDF
                            </a>
                        </div>
                        <span class="field-hint">
                            <i class="fa fa-info-circle"></i>
                            Sube un nuevo archivo solo si deseas reemplazar el actual
                        </span>
                    </div>

                    <!-- Upload PDF -->
                    <div class="field-group field-group-full">
                        <label th:text="*{numeroPdf != null and !#strings.isEmpty(numeroPdf)} ? 'Reemplazar PDF' : 'Archivo PDF'">
                            Archivo PDF
                        </label>
                        <div class="file-upload-wrapper">
                            <label class="file-upload-label" for="archivoPolizaInput">
                                <i class="fa fa-upload"></i>
                                <span id="fileUploadText">Seleccionar archivo PDF...</span>
                            </label>
                            <input type="file"
                                   id="archivoPolizaInput"
                                   th:field="*{archivoPoliza}"
                                   accept=".pdf"
                                   onchange="mostrarNombreArchivo(this)">
                        </div>
                        <span class="field-error" th:if="${#fields.hasErrors('archivoPoliza')}" th:errors="*{archivoPoliza}"></span>
                    </div>

                </div>
            </div>

            <!-- Botones -->
            <div class="form-actions">
                <button type="button" class="btn-cancelar" onclick="history.back()">
                    <i class="fa fa-arrow-left"></i>
                    Cancelar
                </button>
                <button type="submit" class="btn-submit"
                        th:classappend="${modo == 'CREAR'} ? 'btn-submit-green' : 'btn-submit-blue'">
                    <i class="fa" th:classappend="${modo == 'CREAR'} ? 'fa-plus-circle' : 'fa-save'"></i>
                    <span th:text="${modo == 'CREAR'} ? 'Registrar Póliza' : 'Guardar Cambios'"></span>
                </button>
            </div>

        </form>
    </div>

</th:block>

<th:block layout:fragment="jsVista">
    <script th:src="@{/js/usuarios/asesor/poliza/buscarCliente.js}"></script>
</th:block>

</body>
</html>
