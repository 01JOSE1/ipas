<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{plantillas/base}">

<head>
    <title>Login | Registro</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/usuarios/loginRegistroFormulario.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="contenido">

    <div class="zoom-wrapper">
        <div class="container" id="content-sesion">

            <!-- ================= LOGIN ================= -->
            <form id="form-login"
                  th:action="@{/usuarios/login}"
                  method="post">

                <h1 class="titulo-inicio">Iniciar Sesión</h1>
                <p class="aux">Ingresa tus datos</p>

                <input type="email"
                       name="username"
                       placeholder="Correo electrónico"
                       required>

                <div class="password-wrapper">
                    <input type="password"
                           name="password"
                           id="password-login"
                           placeholder="Contraseña"
                           required>
                    <button type="button"
                            id="toggle-contraseña-login"
                            class="btn-toggle-pass"
                            onclick="toggleContraseñaVisibility('password-login', 'toggle-contraseña-login')"
                            title="Mostrar/ocultar contraseña">
                        <i class="fa fa-eye"></i>
                    </button>
                </div>

                <button type="submit">Ingresar</button>
            </form>


            <!-- ========== PANEL ANIMADO CENTRAL ========== -->
            <div id="miDiv" class="Mensaje">
                <div id="text-sesion">

                    <div class="texto1">
                        <h2 class="titulo-sesion">Bienvenido a IPAS</h2>
                        <p class="aviso">Regístrate para acceder a todas las funciones del sistema.</p>
                        <button onclick="moverYCambiar()" class="mover">
                            Crear Cuenta
                        </button>
                    </div>

                    <div>
                        <h2 class="titulo-sesion">¿Ya tienes cuenta?</h2>
                        <p class="aviso">Inicia sesión y continúa usando la plataforma.</p>
                        <button onclick="moverYCambiar()" class="mover">
                            Iniciar Sesión
                        </button>
                    </div>

                </div>
            </div>


            <!-- ================= REGISTRO ================= -->
            <form id="form-register"
                  th:action="@{/usuarios/registro}"
                  th:object="${registroDTO}"
                  method="post">

                <h1>Crear Cuenta</h1>

                <div class="informacion">

                    <input type="text"
                           placeholder="Nombre"
                           th:field="*{nombre}">
                    <div class="error"
                         th:if="${#fields.hasErrors('nombre')}"
                         th:errors="*{nombre}"></div>

                    <input type="text"
                           placeholder="Apellido"
                           th:field="*{apellido}">
                    <div class="error"
                         th:if="${#fields.hasErrors('apellido')}"
                         th:errors="*{apellido}"></div>

                    <input type="email"
                           placeholder="Correo"
                           th:field="*{correo}">
                    <div class="error"
                         th:if="${#fields.hasErrors('correo')}"
                         th:errors="*{correo}"></div>

                    <div class="password-wrapper">
                        <input type="password"
                               id="password-register"
                               placeholder="Contraseña"
                               th:field="*{clave}">
                        <button type="button"
                                id="toggle-contraseña-registro"
                                class="btn-toggle-pass"
                                onclick="toggleContraseñaVisibility('password-register', 'toggle-contraseña-registro')"
                                title="Mostrar/ocultar contraseña">
                            <i class="fa fa-eye"></i>
                        </button>
                    </div>
                    <div class="error"
                         th:if="${#fields.hasErrors('clave')}"
                         th:errors="*{clave}"></div>

                </div>

                <button type="submit">Registrarse</button>
            </form>

        </div>
    </div>

</th:block>

<th:block layout:fragment="js">
    <script th:src="@{/js/usuarios/animacionLoginRegistroFormulario.js}"></script>
</th:block>
</body>

</html>
