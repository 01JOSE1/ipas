<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{plantillas/base}">

<head>
    <title>Asesor</title>

    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/css/plantillas/asesor.css}">
        <th:block layout:fragment="cssVista"></th:block>
    </th:block>
</head>

<body>
<th:block layout:fragment="contenido">

    <div class="dashboard-wrapper">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">

            <!-- Logo / Brand -->
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <i class="fa fa-shield-alt"></i>
                </div>
                <span class="brand-name">IPAS</span>
            </div>

            <!-- Navegación -->
            <nav class="sidebar-nav">

                <div class="nav-section-label">Principal</div>

                <a th:href="@{/asesor/}" class="nav-item" data-path="/asesor/">
                    <i class="fa fa-th-large"></i>
                    <span>Dashboard</span>
                </a>

                <div class="nav-section-label">Gestión</div>

                <a th:href="@{/asesor/cliente/ver-clientes}" class="nav-item" data-path="/asesor/cliente">
                    <i class="fa fa-users"></i>
                    <span>Clientes</span>
                </a>

                <a th:href="@{/asesor/poliza/ver-polizas}" class="nav-item" data-path="/asesor/poliza">
                    <i class="fa fa-file-contract"></i>
                    <span>Pólizas</span>
                </a>

                <div class="nav-section-label">Cuenta</div>

                <a th:href="@{/usuarios/perfil}" class="nav-item" data-path="/asesor/perfil">
                    <i class="fa fa-user-circle"></i>
                    <span>Mi Perfil</span>
                </a>

                <a th:href="@{/asesor/ayuda}" class="nav-item" data-path="/asesor/ayuda">
                    <i class="fa fa-question-circle"></i>
                    <span>Ayuda</span>
                </a>

            </nav>

            <!-- Logout al fondo -->
            <div class="sidebar-footer">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn-logout">
                        <i class="fa fa-sign-out-alt"></i>
                        <span>Cerrar sesión</span>
                    </button>
                </form>
            </div>

        </aside>

        <!-- ===== MAIN ===== -->
        <div class="main-content">

            <!-- NAVBAR SUPERIOR -->
            <header class="topbar">

                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="fa fa-bars"></i>
                </button>

                <!-- El título se setea dinámicamente desde JS según la URL -->
                <div class="topbar-title">
                    <span id="topbar-page-title">IPAS</span>
                </div>

                <div class="topbar-right">

                    <!-- Datos del usuario directos del principal de Spring Security. No se necesita enviar desde ningún controlador. -->
                    <div class="user-info" id="userDropdownTrigger" onclick="toggleUserMenu()">
                        <div class="user-avatar">
                            <span
                                    th:text="${#strings.substring(#authentication.principal.nombre, 0, 1)}">A</span>
                        </div>
                        <div class="user-details">
                            <span class="user-name"
                                  th:text="${#authentication.principal.nombre}">
                                Asesor
                            </span>
                            <span class="user-email"
                                  th:text="${#authentication.principal.username}">
                                asesor@ipas.com
                            </span>
                        </div>
                        <i class="fa fa-chevron-down user-chevron" id="userChevron"></i>
                    </div>

                    <div class="user-dropdown" id="userDropdown">
                        <a th:href="@{/usuarios/perfil}" class="dropdown-item">
                            <i class="fa fa-user"></i> Mi Perfil
                        </a>
                        <div class="dropdown-divider"></div>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item dropdown-logout">
                                <i class="fa fa-sign-out-alt"></i> Cerrar sesión
                            </button>
                        </form>
                    </div>

                </div>
            </header>

            <main class="page-content">
                <th:block layout:fragment="contenidoVista"></th:block>
            </main>

        </div>
    </div>

</th:block>

<th:block layout:fragment="js">
    <script th:inline="javascript">
        window.IPAS_CTX = /*[[@{/}]]*/ "/";
    </script>
    <script th:src="@{/js/plantillas/asesor.js}"></script>
    <th:block layout:fragment="jsVista"></th:block>
</th:block>

</body>
</html>
