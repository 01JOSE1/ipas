<th:block th:fragment="perfilFormulario">

    <!-- Encabezado -->
    <div class="perfil-header">
        <div class="perfil-avatar-xl">
            <span th:text="${#strings.substring(usuarioActualizarDTO.nombre != null ? usuarioActualizarDTO.nombre : 'U', 0, 1)}">U</span>
        </div>
        <div class="perfil-header-info">
            <h1 class="perfil-nombre"
                th:text="${usuarioActualizarDTO.nombre + ' ' + usuarioActualizarDTO.apellido}">
                Usuario
            </h1>
            <span class="perfil-correo">
                <i class="fa fa-envelope"></i>
                <span th:text="${correo}">correo@ipas.com</span>
            </span>
            <span class="perfil-rol-badge">
                <i class="fa fa-shield-alt"></i>
                <span th:text="${#strings.replace(
    #authentication.principal.authorities.iterator().next().authority,
    'ROLE_', '')}">Rol</span>
            </span>
        </div>
    </div>

    <!-- Formulario -->
    <div class="form-card">
        <form th:object="${usuarioActualizarDTO}"
              th:action="${#authentication.principal.authorities.iterator().next().authority == 'ROLE_ADMINISTRADOR'}
                ? @{/administrador/perfil/actualizar}
                : @{/asesor/perfil/actualizar}"
              method="post">

            <!-- Sección: Datos personales -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-user"></i> Datos Personales
                </h3>
                <div class="fields-grid">

                    <div class="field-group">
                        <label>Nombre <span class="required">*</span></label>
                        <input type="text" th:field="*{nombre}" placeholder="Ej: Juan">
                        <span class="field-error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
                    </div>

                    <div class="field-group">
                        <label>Apellido <span class="required">*</span></label>
                        <input type="text" th:field="*{apellido}" placeholder="Ej: Pérez">
                        <span class="field-error" th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
                    </div>

                    <div class="field-group">
                        <label>Tipo de Documento <span class="required">*</span></label>
                        <select th:field="*{tipoDocumento}">
                            <option value="">Seleccione...</option>
                            <option th:each="tipo : ${T(com.proyecto.ipas.negocio.dominio.enums.TipoDocumentoUsuario).values()}"
                                    th:value="${tipo}"
                                    th:text="${tipo}">
                            </option>
                        </select>
                        <span class="field-error" th:if="${#fields.hasErrors('tipoDocumento')}" th:errors="*{tipoDocumento}"></span>
                    </div>

                    <div class="field-group">
                        <label>Número de Documento <span class="required">*</span></label>
                        <input type="text" th:field="*{numeroDocumento}" placeholder="Ej: 1234567890">
                        <span class="field-error" th:if="${#fields.hasErrors('numeroDocumento')}" th:errors="*{numeroDocumento}"></span>
                    </div>

                </div>
            </div>

            <!-- Sección: Contacto -->
            <div class="form-section">
                <h3 class="section-label">
                    <i class="fa fa-address-book"></i> Contacto
                </h3>
                <div class="fields-grid">

                    <div class="field-group">
                        <label>Teléfono <span class="required">*</span></label>
                        <input type="text" th:field="*{telefono}" placeholder="Ej: 3001234567">
                        <span class="field-error" th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}"></span>
                    </div>

                    <div class="field-group">
                        <label>Correo electrónico</label>
                        <input type="email" th:value="${correo}" disabled class="input-disabled">
                        <span class="field-hint"><i class="fa fa-lock"></i> El correo no se puede modificar</span>
                    </div>

                    <div class="field-group field-group-full">
                        <label>Dirección</label>
                        <input type="text" th:field="*{direccion}" placeholder="Ej: Calle 10 #20-30">
                        <span class="field-error" th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}"></span>
                    </div>

                </div>
            </div>

            <!-- Botones -->
            <div class="form-actions">
                <button type="button" class="btn-cancelar" onclick="window.location.reload()">
                    <i class="fa fa-arrow-left"></i>
                    Cancelar
                </button>
                <button type="submit" class="btn-submit btn-submit-blue">
                    <i class="fa fa-save"></i>
                    Guardar Cambios
                </button>
            </div>

        </form>
    </div>

</th:block>
